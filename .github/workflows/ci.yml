name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  macos-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build macOS app target
        run: swift build

  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Windows app dependencies
        run: python -m pip install -r windows\requirements.txt
      - name: Run Windows unit tests
        run: python -m unittest discover -s windows/tests -v
        env:
          PYTHONPATH: windows
